<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>光の反射パズル - セクター版</title>
<style>
    body {
        font-family: sans-serif;
        text-align: center;
        background-color: #ffffff;
        color: #000000;
        margin-top: 30px;
    }
    h1 {
        font-size: 20px;
        margin-bottom: 10px;
    }
    #status-container {
        font-size: 18px;
        margin-bottom: 15px;
        font-weight: bold;
    }
    #shoot-count {
        color: #d9534f;
        font-size: 22px;
    }
    #ui-controls {
        margin-bottom: 20px;
    }
    button {
        padding: 8px 16px;
        font-size: 16px;
        cursor: pointer;
        margin: 0 5px;
    }
    button:disabled {
        cursor: not-allowed;
        opacity: 0.5;
    }
    #sector-indicator {
        font-size: 18px;
        font-weight: bold;
        display: inline-block;
        width: 130px;
    }
    /* 盤面エリア */
    #game-area {
        position: relative;
        width: 300px;
        height: 300px;
        margin: 0 auto;
        border: 2px solid #000;
        background-color: #fff;
    }
    #grid-container {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(3, 1fr);
        width: 100%;
        height: 100%;
    }
    .cell {
        border: 1px solid #000;
        box-sizing: border-box;
        position: relative;
        cursor: pointer;
    }
    .wall {
        background-color: #000;
        cursor: not-allowed;
    }
    .item-a::before {
        content: '';
        position: absolute;
        width: 60%;
        height: 60%;
        border: 3px solid #000;
        border-radius: 50%;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        box-sizing: border-box;
    }
    /* 鏡 (/) : mirror=1 */
    .mirror-1 {
        background-image: linear-gradient(to top right, transparent calc(50% - 2px), black calc(50% - 2px), black calc(50% + 2px), transparent calc(50% + 2px));
    }
    /* 鏡 (\) : mirror=2 */
    .mirror-2 {
        background-image: linear-gradient(to bottom right, transparent calc(50% - 2px), black calc(50% - 2px), black calc(50% + 2px), transparent calc(50% + 2px));
    }
    /* スタート・ゴールの表示 */
    .start-top { box-shadow: inset 0 8px 0 blue; }
    .start-bottom { box-shadow: inset 0 -8px 0 blue; }
    .start-left { box-shadow: inset 8px 0 0 blue; }
    .start-right { box-shadow: inset -8px 0 0 blue; }

    .goal-top { box-shadow: inset 0 8px 0 red; }
    .goal-bottom { box-shadow: inset 0 -8px 0 red; }
    .goal-left { box-shadow: inset 8px 0 0 red; }
    .goal-right { box-shadow: inset -8px 0 0 red; }

    #laser-canvas {
        position: absolute;
        top: 0;
        left: 0;
        pointer-events: none;
    }
</style>
</head>
<body>

<h1>光の反射パズル</h1>

<div id="status-container">
    残り照射回数: <span id="shoot-count">5</span> 回
</div>

<div id="ui-controls">
    <button onclick="changeSector(-1)">前に戻る</button>
    <span id="sector-indicator">セクター: 1</span>
    <button onclick="changeSector(1)">次に行く</button>
    <br><br>
    <button id="shoot-btn" onclick="shootLaser()">照射 / 再照射</button>
    <button onclick="initGame()">リセット</button>
</div>

<div id="game-area">
    <div id="grid-container"></div>
    <canvas id="laser-canvas" width="300" height="300"></canvas>
</div>

<script>
const GRID_SIZE = 9;
let grid = [];

// 方向の定義: 0=上, 1=右, 2=下, 3=左
const DIR_UP = 0, DIR_RIGHT = 1, DIR_DOWN = 2, DIR_LEFT = 3;
const DX = [0, 1, 0, -1];
const DY = [-1, 0, 1, 0];

let currentSectorId = 0;
let startEdge = null;
let goalEdge = null;

let isShooting = false;
let isGameOver = false;
let remainingShoots = 5;
let laserPath = [];
let animStep = 0;
let laserInterval = null;

// ご提示いただいた反射ロジック
function getReflectedDir(dir, mirror) {
    if (mirror === 0) return dir;
    if (mirror === 1) return [1, 0, 3, 2][dir]; // '/'
    if (mirror === 2) return [3, 2, 1, 0][dir]; // '\'
    return dir;
}

function initGame() {
    remainingShoots = 5;
    isShooting = false;
    isGameOver = false;
    laserPath = [];
    animStep = 0;
    if (laserInterval) clearInterval(laserInterval);

    for (let y = 0; y < GRID_SIZE; y++) {
        grid[y] = [];
        for (let x = 0; x < GRID_SIZE; x++) {
            grid[y][x] = { type: 'empty', mirror: 0 };
        }
    }

    // スタートとゴールの配置
    // 方向(dir)も0〜3のインデックスで管理
    let edges = [];
    for (let x = 0; x < 9; x++) edges.push({ x: x, y: 0, side: 'top', dir: DIR_DOWN, sectorId: Math.floor(x / 3) });
    for (let x = 0; x < 9; x++) edges.push({ x: x, y: 8, side: 'bottom', dir: DIR_UP, sectorId: 6 + Math.floor(x / 3) });
    for (let y = 0; y < 9; y++) edges.push({ x: 0, y: y, side: 'left', dir: DIR_RIGHT, sectorId: Math.floor(y / 3) * 3 });
    for (let y = 0; y < 9; y++) edges.push({ x: 8, y: y, side: 'right', dir: DIR_LEFT, sectorId: Math.floor(y / 3) * 3 + 2 });

    startEdge = edges[Math.floor(Math.random() * edges.length)];
    while (true) {
        let candidate = edges[Math.floor(Math.random() * edges.length)];
        if (candidate.sectorId !== startEdge.sectorId) {
            goalEdge = candidate;
            break;
        }
    }

    // 壁の配置（スタート・ゴールは避ける）
    for (let sy = 0; sy < 3; sy++) {
        for (let sx = 0; sx < 3; sx++) {
            let wallsPlaced = 0;
            while (wallsPlaced < 2) {
                let dx = Math.floor(Math.random() * 3);
                let dy = Math.floor(Math.random() * 3);
                let x = sx * 3 + dx;
                let y = sy * 3 + dy;
                
                if ((x === startEdge.x && y === startEdge.y) || (x === goalEdge.x && y === goalEdge.y)) {
                    continue;
                }
                if (grid[y][x].type === 'empty') {
                    grid[y][x].type = 'wall';
                    wallsPlaced++;
                }
            }
        }
    }

    // アイテムAの配置
    let itemsPlaced = 0;
    while (itemsPlaced < 2) {
        let x = Math.floor(Math.random() * GRID_SIZE);
        let y = Math.floor(Math.random() * GRID_SIZE);
        
        if ((x === startEdge.x && y === startEdge.y) || (x === goalEdge.x && y === goalEdge.y)) {
            continue;
        }
        if (grid[y][x].type === 'empty') {
            grid[y][x].type = 'itemA';
            itemsPlaced++;
        }
    }

    updateUI();
    drawSector();
}

function updateUI() {
    document.getElementById('shoot-count').innerText = remainingShoots;
    document.getElementById('sector-indicator').innerText = `セクター: ${currentSectorId + 1}`;
    document.getElementById('shoot-btn').disabled = isGameOver;
}

function changeSector(dir) {
    currentSectorId += dir;
    if (currentSectorId < 0) currentSectorId = 8;
    if (currentSectorId > 8) currentSectorId = 0;
    updateUI();
    drawSector();
}

function drawSector() {
    const container = document.getElementById('grid-container');
    container.innerHTML = '';

    let sy = Math.floor(currentSectorId / 3);
    let sx = currentSectorId % 3;

    for (let y = sy * 3; y < sy * 3 + 3; y++) {
        for (let x = sx * 3; x < sx * 3 + 3; x++) {
            let cell = grid[y][x];
            let div = document.createElement('div');
            div.className = 'cell';

            if (cell.type === 'wall') div.classList.add('wall');
            if (cell.type === 'itemA') div.classList.add('item-a');
            if (cell.mirror === 1) div.classList.add('mirror-1');
            if (cell.mirror === 2) div.classList.add('mirror-2');

            if (startEdge.x === x && startEdge.y === y) div.classList.add('start-' + startEdge.side);
            if (goalEdge.x === x && goalEdge.y === y) div.classList.add('goal-' + goalEdge.side);

            div.onclick = () => {
                if (isShooting || isGameOver) return; 
                if (cell.type === 'wall' || cell.type === 'itemA') return; 

                if (animStep > 0 && !isShooting) {
                    laserPath = [];
                    animStep = 0;
                }

                cell.mirror = (cell.mirror + 1) % 3;
                drawSector();
            };
            container.appendChild(div);
        }
    }
    drawLaser();
}

function shootLaser() {
    if (isGameOver || isShooting) return;

    remainingShoots--;
    updateUI();

    if (laserInterval) clearInterval(laserInterval);
    laserPath = [];
    
    let curX = startEdge.x;
    let curY = startEdge.y;
    let curDir = startEdge.dir; // インデックス 0〜3

    while (true) {
        if (curX < 0 || curX >= 9 || curY < 0 || curY >= 9) break; 

        let cell = grid[curY][curX];
        let step = { x: curX, y: curY, inDir: curDir, outDir: null, event: null };

        if (cell.type === 'wall') {
            step.event = 'wall';
            laserPath.push(step);
            break;
        }
        if (cell.type === 'itemA') {
            step.event = 'itemA';
            laserPath.push(step);
            break;
        }

        // リファレンスコードのロジックで反射計算
        let nextDir = getReflectedDir(curDir, cell.mirror);
        step.outDir = nextDir;
        laserPath.push(step);

        // ゴール判定
        let isGoal = false;
        if (goalEdge.x === curX && goalEdge.y === curY) {
            if (goalEdge.side === 'top' && nextDir === DIR_UP) isGoal = true;
            if (goalEdge.side === 'bottom' && nextDir === DIR_DOWN) isGoal = true;
            if (goalEdge.side === 'left' && nextDir === DIR_LEFT) isGoal = true;
            if (goalEdge.side === 'right' && nextDir === DIR_RIGHT) isGoal = true;
        }

        if (isGoal) {
            step.event = 'goal';
            break;
        }

        // 移動
        curX += DX[nextDir];
        curY += DY[nextDir];
        curDir = nextDir;
    }

    isShooting = true;
    animStep = 0;
    laserInterval = setInterval(() => {
        animStep++;
        drawSector();

        if (animStep >= laserPath.length) {
            clearInterval(laserInterval);
            isShooting = false;
            let lastStep = laserPath[laserPath.length - 1];
            
            setTimeout(() => {
                if (lastStep.event === 'itemA') {
                    alert('アイテムAに触れました！すべての鏡が消滅します。');
                    for (let y = 0; y < 9; y++) {
                        for (let x = 0; x < 9; x++) grid[y][x].mirror = 0;
                    }
                    drawSector();
                } else if (lastStep.event === 'goal') {
                    alert('クリア！光がゴールに到達しました。');
                    return; 
                }
                
                if (remainingShoots === 0 && lastStep.event !== 'goal') {
                    isGameOver = true;
                    updateUI();
                    alert('ゲームオーバー！照射回数が上限に達しました。');
                }
            }, 50);
        }
    }, 200); 
}

function drawLaser() {
    const canvas = document.getElementById('laser-canvas');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (laserPath.length === 0 || animStep === 0) return;

    ctx.strokeStyle = 'red';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath();

    const CELL_SIZE = 100; 
    let sy = Math.floor(currentSectorId / 3);
    let sx = currentSectorId % 3;

    for (let i = 0; i < animStep; i++) {
        let step = laserPath[i];
        
        if (Math.floor(step.x / 3) === sx && Math.floor(step.y / 3) === sy) {
            let cx = (step.x % 3) * CELL_SIZE + CELL_SIZE / 2;
            let cy = (step.y % 3) * CELL_SIZE + CELL_SIZE / 2;
            
            let inX = cx - DX[step.inDir] * CELL_SIZE / 2;
            let inY = cy - DY[step.inDir] * CELL_SIZE / 2;
            ctx.moveTo(inX, inY);
            ctx.lineTo(cx, cy);

            if (step.outDir !== null && step.event !== 'wall' && step.event !== 'itemA') {
                let outX = cx + DX[step.outDir] * CELL_SIZE / 2;
                let outY = cy + DY[step.outDir] * CELL_SIZE / 2;
                ctx.lineTo(outX, outY);
            }
        }
    }
    ctx.stroke();
}

initGame();
</script>
</body>
</html>
