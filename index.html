<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>光の反射パズル</title>
<style>
    body {
        font-family: sans-serif;
        text-align: center;
        background-color: #ffffff;
        color: #000000;
        margin-top: 30px;
    }
    h1 {
        font-size: 20px;
    }
    #ui-controls {
        margin-bottom: 20px;
    }
    button {
        padding: 8px 16px;
        font-size: 16px;
        cursor: pointer;
        margin: 0 5px;
    }
    #sun-indicator {
        font-size: 18px;
        font-weight: bold;
        display: inline-block;
        width: 100px;
    }
    /* 盤面エリア（3×3マス表示用） */
    #game-area {
        position: relative;
        width: 300px;
        height: 300px;
        margin: 0 auto;
        border: 2px solid #000;
        background-color: #fff;
    }
    #grid-container {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(3, 1fr);
        width: 100%;
        height: 100%;
    }
    .cell {
        border: 1px solid #000;
        box-sizing: border-box;
        position: relative;
        cursor: pointer;
    }
    /* 壁 */
    .wall {
        background-color: #000;
        cursor: not-allowed;
    }
    /* アイテムA */
    .item-a::before {
        content: '';
        position: absolute;
        width: 60%;
        height: 60%;
        border: 3px solid #000;
        border-radius: 50%;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        box-sizing: border-box;
    }
    /* 鏡 (/) */
    .mirror-1 {
        background-image: linear-gradient(to top right, transparent calc(50% - 2px), black calc(50% - 2px), black calc(50% + 2px), transparent calc(50% + 2px));
    }
    /* 鏡 (\) */
    .mirror-2 {
        background-image: linear-gradient(to bottom right, transparent calc(50% - 2px), black calc(50% - 2px), black calc(50% + 2px), transparent calc(50% + 2px));
    }
    /* スタート（青）とゴール（赤）の辺 */
    .start-top { box-shadow: inset 0 8px 0 blue; }
    .start-bottom { box-shadow: inset 0 -8px 0 blue; }
    .start-left { box-shadow: inset 8px 0 0 blue; }
    .start-right { box-shadow: inset -8px 0 0 blue; }

    .goal-top { box-shadow: inset 0 8px 0 red; }
    .goal-bottom { box-shadow: inset 0 -8px 0 red; }
    .goal-left { box-shadow: inset 8px 0 0 red; }
    .goal-right { box-shadow: inset -8px 0 0 red; }

    /* 光の描画用キャンバス */
    #laser-canvas {
        position: absolute;
        top: 0;
        left: 0;
        pointer-events: none; /* クリックを下のマスに貫通させる */
    }
</style>
</head>
<body>

<h1>光の反射パズル</h1>
<div id="ui-controls">
    <button onclick="changeSun(-1)">前に戻る</button>
    <span id="sun-indicator">サン: 1</span>
    <button onclick="changeSun(1)">次に行く</button>
    <br><br>
    <button onclick="shootLaser()">照射 / 再照射</button>
</div>

<div id="game-area">
    <div id="grid-container"></div>
    <canvas id="laser-canvas" width="300" height="300"></canvas>
</div>

<script>
const GRID_SIZE = 9;
const SUN_SIZE = 3;
let grid = [];

// 状態管理
let currentSunId = 0; // 0〜8
let startEdge = null;
let goalEdge = null;

let isShooting = false;
let laserPath = [];
let animStep = 0;
let laserInterval = null;

// ゲーム初期化処理
function initGame() {
    // 9x9の盤面を初期化
    for (let y = 0; y < GRID_SIZE; y++) {
        grid[y] = [];
        for (let x = 0; x < GRID_SIZE; x++) {
            grid[y][x] = { type: 'empty', mirror: 0 };
        }
    }

    // 1. 各サンに壁を2つ配置
    for (let sy = 0; sy < 3; sy++) {
        for (let sx = 0; sx < 3; sx++) {
            let wallsPlaced = 0;
            while (wallsPlaced < 2) {
                let dx = Math.floor(Math.random() * 3);
                let dy = Math.floor(Math.random() * 3);
                let x = sx * 3 + dx;
                let y = sy * 3 + dy;
                if (grid[y][x].type === 'empty') {
                    grid[y][x].type = 'wall';
                    wallsPlaced++;
                }
            }
        }
    }

    // 2. 盤面全体からアイテムAを2つ配置
    let itemsPlaced = 0;
    while (itemsPlaced < 2) {
        let x = Math.floor(Math.random() * GRID_SIZE);
        let y = Math.floor(Math.random() * GRID_SIZE);
        if (grid[y][x].type === 'empty') {
            grid[y][x].type = 'itemA';
            itemsPlaced++;
        }
    }

    // 3. スタートとゴールの配置（外周の辺のみ）
    let edges = [];
    for (let x = 0; x < 9; x++) edges.push({ x: x, y: 0, side: 'top', dir: { dx: 0, dy: 1 }, sunId: Math.floor(x / 3) });
    for (let x = 0; x < 9; x++) edges.push({ x: x, y: 8, side: 'bottom', dir: { dx: 0, dy: -1 }, sunId: 6 + Math.floor(x / 3) });
    for (let y = 0; y < 9; y++) edges.push({ x: 0, y: y, side: 'left', dir: { dx: 1, dy: 0 }, sunId: Math.floor(y / 3) * 3 });
    for (let y = 0; y < 9; y++) edges.push({ x: 8, y: y, side: 'right', dir: { dx: -1, dy: 0 }, sunId: Math.floor(y / 3) * 3 + 2 });

    startEdge = edges[Math.floor(Math.random() * edges.length)];
    while (true) {
        let candidate = edges[Math.floor(Math.random() * edges.length)];
        if (candidate.sunId !== startEdge.sunId) {
            goalEdge = candidate;
            break;
        }
    }

    drawSun();
}

// サンの切り替え
function changeSun(dir) {
    currentSunId += dir;
    if (currentSunId < 0) currentSunId = 8;
    if (currentSunId > 8) currentSunId = 0;
    document.getElementById('sun-indicator').innerText = `サン: ${currentSunId + 1}`;
    drawSun();
}

// 現在のサンを描画する
function drawSun() {
    const container = document.getElementById('grid-container');
    container.innerHTML = '';

    let sy = Math.floor(currentSunId / 3);
    let sx = currentSunId % 3;

    for (let y = sy * 3; y < sy * 3 + 3; y++) {
        for (let x = sx * 3; x < sx * 3 + 3; x++) {
            let cell = grid[y][x];
            let div = document.createElement('div');
            div.className = 'cell';

            if (cell.type === 'wall') div.classList.add('wall');
            if (cell.type === 'itemA') div.classList.add('item-a');
            if (cell.mirror === 1) div.classList.add('mirror-1');
            if (cell.mirror === 2) div.classList.add('mirror-2');

            // スタートとゴールの辺を描画
            if (startEdge.x === x && startEdge.y === y) div.classList.add('start-' + startEdge.side);
            if (goalEdge.x === x && goalEdge.y === y) div.classList.add('goal-' + goalEdge.side);

            // マスクリックで鏡を配置
            div.onclick = () => {
                if (isShooting) return; // 照射中は操作不可
                if (cell.type === 'wall' || cell.type === 'itemA') return; // 壁やアイテムには置けない

                // 照射終了後に鏡を操作したら前回のレーザーを消す
                if (animStep > 0 && !isShooting) {
                    laserPath = [];
                    animStep = 0;
                }

                cell.mirror = (cell.mirror + 1) % 3; // 0: なし, 1: /, 2: \
                drawSun();
            };
            container.appendChild(div);
        }
    }
    drawLaser();
}

// 光のシミュレーション計算とアニメーション開始
function shootLaser() {
    if (laserInterval) clearInterval(laserInterval);
    laserPath = [];
    
    let curX = startEdge.x;
    let curY = startEdge.y;
    let curDir = { ...startEdge.dir };

    // 光の軌跡を事前計算
    while (true) {
        if (curX < 0 || curX >= 9 || curY < 0 || curY >= 9) break; // 盤面外

        let cell = grid[curY][curX];
        let step = { x: curX, y: curY, inDir: curDir, outDir: null, event: null };
        laserPath.push(step);

        if (cell.type === 'wall') {
            step.event = 'wall';
            break;
        }
        if (cell.type === 'itemA') {
            step.event = 'itemA';
            break;
        }

        let nextDir = { ...curDir };
        if (cell.mirror === 1) { // '/'
            if (curDir.dx !== 0) nextDir = { dx: 0, dy: -curDir.dx };
            else nextDir = { dx: -curDir.dy, dy: 0 };
        } else if (cell.mirror === 2) { // '\'
            if (curDir.dx !== 0) nextDir = { dx: 0, dy: curDir.dx };
            else nextDir = { dx: curDir.dy, dy: 0 };
        }
        step.outDir = nextDir;

        // ゴール判定
        let isGoal = false;
        if (goalEdge.x === curX && goalEdge.y === curY) {
            if (goalEdge.side === 'top' && nextDir.dy === -1) isGoal = true;
            if (goalEdge.side === 'bottom' && nextDir.dy === 1) isGoal = true;
            if (goalEdge.side === 'left' && nextDir.dx === -1) isGoal = true;
            if (goalEdge.side === 'right' && nextDir.dx === 1) isGoal = true;
        }

        if (isGoal) {
            step.event = 'goal';
            break;
        }

        curX += nextDir.dx;
        curY += nextDir.dy;
    }

    isShooting = true;
    animStep = 0;
    laserInterval = setInterval(() => {
        animStep++;
        drawSun();

        // 描画終了時
        if (animStep >= laserPath.length) {
            clearInterval(laserInterval);
            isShooting = false;
            let lastStep = laserPath[laserPath.length - 1];
            
            // 少し遅らせてからアラートを出す（描画を反映させるため）
            setTimeout(() => {
                if (lastStep.event === 'itemA') {
                    alert('アイテムAに触れました！すべての鏡が消滅します。');
                    // ペナルティ: 全鏡消去
                    for (let y = 0; y < 9; y++) {
                        for (let x = 0; x < 9; x++) {
                            grid[y][x].mirror = 0;
                        }
                    }
                    drawSun();
                } else if (lastStep.event === 'goal') {
                    alert('クリア！光がゴールに到達しました。');
                }
            }, 50);
        }
    }, 200); // 1マスあたり0.2秒
}

// キャンバスへの光の描画
function drawLaser() {
    const canvas = document.getElementById('laser-canvas');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (laserPath.length === 0 || animStep === 0) return;

    ctx.strokeStyle = 'red';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath();

    const CELL_SIZE = 100; // 300px / 3マス
    let sy = Math.floor(currentSunId / 3);
    let sx = currentSunId % 3;

    for (let i = 0; i < animStep; i++) {
        let step = laserPath[i];
        
        // 描画ステップが現在表示中のサンに含まれるかチェック
        if (Math.floor(step.x / 3) === sx && Math.floor(step.y / 3) === sy) {
            let cx = (step.x % 3) * CELL_SIZE + CELL_SIZE / 2;
            let cy = (step.y % 3) * CELL_SIZE + CELL_SIZE / 2;
            
            // 入射側から中心へ
            let inX = cx - step.inDir.dx * CELL_SIZE / 2;
            let inY = cy - step.inDir.dy * CELL_SIZE / 2;
            ctx.moveTo(inX, inY);
            ctx.lineTo(cx, cy);

            // 中心から出射側へ
            if (step.outDir) {
                let outX = cx + step.outDir.dx * CELL_SIZE / 2;
                let outY = cy + step.outDir.dy * CELL_SIZE / 2;
                ctx.lineTo(outX, outY);
            }
        }
    }
    ctx.stroke();
}

// ゲーム起動
initGame();
</script>
</body>
</html>
