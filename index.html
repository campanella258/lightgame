<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リフレクト・パズル (Reflect Puzzle) - ゲームオーバー時クリア機能版</title>
    <style>
        :root {
            --bg-color: #1a1a24;
            --panel-bg: #252538;
            --grid-bg: #2d2d44;
            --border-color: #444466;
            --text-color: #e0e0ff;
            --accent-color: #00ffff;
            --accent-highlight: #ff00ff;
            --mirror-color: #ffffff;
            --memo-color: #8888aa;
            --answer-color: #ffaa00;
        }

        * { box-sizing: border-box; user-select: none; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            margin-bottom: 5px;
            font-size: 24px;
            text-align: center;
            color: var(--accent-color);
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }

        .description {
            max-width: 600px;
            font-size: 14px;
            color: #aaaaf0;
            margin-bottom: 15px;
            text-align: center;
            line-height: 1.5;
        }
        
        .rule-box {
            background-color: rgba(0, 255, 255, 0.1);
            border: 1px solid var(--accent-color);
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-weight: bold;
            text-align: center;
        }

        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        button, select {
            background-color: var(--panel-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        button:hover, select:hover {
            border-color: var(--accent-color);
            background-color: #2d2d48;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
            border-color: var(--border-color) !important;
        }

        .mode-btn.active {
            background-color: var(--accent-color);
            color: #000;
            font-weight: bold;
        }

        .game-container {
            background-color: var(--panel-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: visible;
            display: block;
        }

        #board {
            display: grid;
            background-color: var(--grid-bg);
            border: 2px solid var(--border-color);
            margin: 0 auto;
        }

        .cell {
            position: relative;
            border: 1px solid rgba(68, 68, 102, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background-color: rgba(255, 255, 255, 0.02);
        }

        .cell:hover { background-color: rgba(255, 255, 255, 0.05); }

        .edge {
            background-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .edge::after {
            content: ''; width: 8px; height: 8px;
            border-radius: 50%; background-color: #3d3d5c;
            transition: all 0.2s;
        }
        .edge.laser-source::after { background-color: #446644; }
        .edge.highlight::after {
            background-color: var(--accent-color) !important;
            box-shadow: 0 0 12px var(--accent-color);
            transform: scale(1.5);
        }
        .edge.highlight-pair::after {
            background-color: var(--accent-highlight) !important;
            box-shadow: 0 0 12px var(--accent-highlight);
            transform: scale(1.5);
        }

        .mirror, .memo-mirror, .answer-mirror {
            position: absolute; width: 80%; height: 2px;
            top: 50%; left: 10%; transform-origin: center;
        }
        .mirror { background-color: var(--mirror-color); box-shadow: 0 0 8px rgba(255,255,255,0.8); height: 3px; z-index: 3; }
        .memo-mirror { background-color: var(--memo-color); border-top: 2px dashed var(--memo-color); height: 0; z-index: 2; }
        .answer-mirror { background-color: var(--answer-color); box-shadow: 0 0 8px rgba(255, 170, 0, 0.8); height: 3px; z-index: 1; } /* opacity: 0.6 を削除し、くっきり表示に */

        .slash { transform: translateY(-50%) rotate(-45deg); }
        .backslash { transform: translateY(-50%) rotate(45deg); }

        .status-message { margin-top: 15px; font-size: 15px; font-weight: bold; min-height: 40px; color: var(--accent-color); text-align: center; line-height: 1.4; }

    </style>
</head>
<body>

    <h1>リフレクト・パズル</h1>
    <div class="description">
        <div class="rule-box" id="rule-text">ルール：各行・各列には【必ず2個】の鏡が隠されています。</div>
        下辺と左辺の●にマウスを重ねると、光の「入口」と「出口」がハイライトされます。<br>
        「行・列に必ず2個」という条件を満たし、光のペアを正しくつなぐ鏡の配置を導き出してください。
    </div>

    <div class="controls">
        <select id="difficulty">
            <option value="3">3 × 3 (初級)</option>
            <option value="4">4 × 4 (初級)</option>
            <option value="5" selected>5 × 5 (中級)</option>
            <option value="6">6 × 6 (中級)</option>
            <option value="7">7 × 7 (上級)</option>
            <option value="8">8 × 8 (上級)</option>
        </select>
        <button id="btn-new-game">新盤面生成</button>
        <button id="btn-mode" class="mode-btn">モード: 通常配置</button>
        <button id="btn-check">答え合わせ (残り3回)</button>
    </div>

    <div class="game-container">
        <div id="board"></div>
    </div>

    <div class="status-message" id="status-text"></div>

    <script>
        let N = 5;
        let answerGrid = []; 
        let playerGrid = []; 
        let memoGrid = [];   
        let rayPairs = [];   
        
        let isMemoMode = false;
        let isGameOver = false;
        let forceReveal = false;
        let remainingChecks = 3;

        const DIR = { UP: 0, RIGHT: 1, DOWN: 2, LEFT: 3 };

        const boardEl = document.getElementById('board');
        const statusText = document.getElementById('status-text');
        
        const btnNewGame = document.getElementById('btn-new-game');
        const btnMode = document.getElementById('btn-mode');
        const btnCheck = document.getElementById('btn-check');
        const selectDiff = document.getElementById('difficulty');

        btnNewGame.addEventListener('click', initGame);
        btnCheck.addEventListener('click', checkAnswer);
        
        btnMode.addEventListener('click', () => {
            if (isGameOver) return;
            isMemoMode = !isMemoMode;
            btnMode.textContent = isMemoMode ? "モード: 仮置きメモ" : "モード: 通常配置";
            btnMode.classList.toggle('active', isMemoMode);
        });

        selectDiff.addEventListener('change', (e) => {
            N = parseInt(e.target.value);
            initGame();
        });

        function refreshAllCells() {
            for (let r = 0; r < N; r++) {
                for (let c = 0; c < N; c++) {
                    const cellEl = document.querySelector(`.cell[data-row='${r}'][data-col='${c}']`);
                    if (cellEl) cellEl.updateMirror();
                }
            }
        }

        // --- 盤面生成ロジック ---
        function initGame() {
            // ステータスと回数制限のリセット
            statusText.textContent = "";
            isGameOver = false;
            forceReveal = false;
            remainingChecks = 3;
            btnCheck.disabled = false;
            btnCheck.textContent = `答え合わせ (残り${remainingChecks}回)`;
            
            answerGrid = generateValidGrid();
            rayPairs = simulateAllRays(answerGrid);
            
            playerGrid = Array.from({ length: N }, () => Array(N).fill(0));
            memoGrid = Array.from({ length: N }, () => Array(N).fill(0));
            
            renderBoard();
        }

        function generateValidGrid() {
            const maxAttempts = 10000;
            for (let i = 0; i < maxAttempts; i++) {
                let grid = createRandomExact2GridFast();
                if (checkAllMirrorsHit(grid)) {
                    return grid;
                }
            }
            return createRandomExact2GridFast();
        }

        function createRandomExact2GridFast() {
            let grid = Array.from({length: N}, () => Array(N).fill(0));
            
            let p1 = Array.from({length: N}, (_, i) => i);
            for (let i = N - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [p1[i], p1[j]] = [p1[j], p1[i]];
            }
            
            let p2 = Array.from({length: N}, (_, i) => i);
            let valid = false;
            while (!valid) {
                for (let i = N - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [p2[i], p2[j]] = [p2[j], p2[i]];
                }
                valid = true;
                for (let i = 0; i < N; i++) {
                    if (p1[i] === p2[i]) { valid = false; break; }
                }
            }

            for (let i = 0; i < N; i++) {
                grid[i][p1[i]] = Math.random() < 0.5 ? 1 : 2;
                grid[i][p2[i]] = Math.random() < 0.5 ? 1 : 2;
            }
            return grid;
        }

        function checkAllMirrorsHit(grid) {
            let hitSet = new Set();
            for (let c = 0; c < N; c++) traceAndMark(grid, N - 1, c, DIR.UP, hitSet);
            for (let r = 0; r < N; r++) traceAndMark(grid, r, 0, DIR.RIGHT, hitSet);
            return hitSet.size === (2 * N);
        }

        function traceAndMark(grid, startR, startC, startDir, hitSet) {
            let r = startR; let c = startC; let dir = startDir;
            let steps = 0; const maxSteps = N * N * 2;
            while (r >= 0 && r < N && c >= 0 && c < N && steps < maxSteps) {
                steps++;
                let mirror = grid[r][c];
                if (mirror !== 0) {
                    hitSet.add(r + "," + c);
                    if (mirror === 1) { 
                        if (dir === DIR.UP) dir = DIR.RIGHT;
                        else if (dir === DIR.RIGHT) dir = DIR.UP;
                        else if (dir === DIR.DOWN) dir = DIR.LEFT;
                        else if (dir === DIR.LEFT) dir = DIR.DOWN;
                    } else if (mirror === 2) { 
                        if (dir === DIR.UP) dir = DIR.LEFT;
                        else if (dir === DIR.LEFT) dir = DIR.UP;
                        else if (dir === DIR.DOWN) dir = DIR.RIGHT;
                        else if (dir === DIR.RIGHT) dir = DIR.DOWN;
                    }
                }
                if (dir === DIR.UP) r--;
                else if (dir === DIR.RIGHT) c++;
                else if (dir === DIR.DOWN) r++;
                else if (dir === DIR.LEFT) c--;
            }
        }

        function simulateAllRays(grid) {
            let pairs = [];
            for (let c = 0; c < N; c++) {
                let start = { type: 'bottom', idx: c };
                let end = traceRay(grid, N - 1, c, DIR.UP);
                pairs.push({ start, end });
            }
            for (let r = 0; r < N; r++) {
                let start = { type: 'left', idx: r };
                let end = traceRay(grid, r, 0, DIR.RIGHT);
                pairs.push({ start, end });
            }
            return pairs;
        }

        function traceRay(grid, startR, startC, startDir) {
            let r = startR; let c = startC; let dir = startDir;
            let steps = 0; const maxSteps = N * N * 2;

            while (r >= 0 && r < N && c >= 0 && c < N && steps < maxSteps) {
                steps++;
                let mirror = grid[r][c];
                if (mirror === 1) { 
                    if (dir === DIR.UP) dir = DIR.RIGHT;
                    else if (dir === DIR.RIGHT) dir = DIR.UP;
                    else if (dir === DIR.DOWN) dir = DIR.LEFT;
                    else if (dir === DIR.LEFT) dir = DIR.DOWN;
                } else if (mirror === 2) { 
                    if (dir === DIR.UP) dir = DIR.LEFT;
                    else if (dir === DIR.LEFT) dir = DIR.UP;
                    else if (dir === DIR.DOWN) dir = DIR.RIGHT;
                    else if (dir === DIR.RIGHT) dir = DIR.DOWN;
                }

                if (dir === DIR.UP) r--;
                else if (dir === DIR.RIGHT) c++;
                else if (dir === DIR.DOWN) r++;
                else if (dir === DIR.LEFT) c--;
            }

            if (r < 0) return { type: 'top', idx: c };
            if (c >= N) return { type: 'right', idx: r };
            if (r >= N) return { type: 'bottom', idx: c };
            if (c < 0) return { type: 'left', idx: r };
            return { type: 'unknown', idx: -1 };
        }

        function renderBoard() {
            boardEl.innerHTML = "";
            let cellSize = 54;
            if (N === 6) cellSize = 48;
            if (N === 7) cellSize = 44;
            if (N === 8) cellSize = 40;

            boardEl.style.gridTemplateColumns = `repeat(${N + 2}, ${cellSize}px)`;
            boardEl.style.gridTemplateRows = `repeat(${N + 2}, ${cellSize}px)`;

            for (let r = -1; r <= N; r++) {
                for (let c = -1; c <= N; c++) {
                    if ((r === -1 || r === N) && (c === -1 || c === N)) {
                        let empty = document.createElement('div');
                        boardEl.appendChild(empty);
                        continue;
                    }

                    if (r === -1 || r === N || c === -1 || c === N) {
                        let edgeEl = document.createElement('div');
                        edgeEl.classList.add('edge');
                        
                        let type = ''; let idx = -1;
                        if (r === -1) { type = 'top'; idx = c; }
                        else if (c === N) { type = 'right'; idx = r; }
                        else if (r === N) { type = 'bottom'; idx = c; }
                        else if (c === -1) { type = 'left'; idx = r; }

                        edgeEl.dataset.type = type;
                        edgeEl.dataset.idx = idx;

                        if (type === 'bottom' || type === 'left') {
                            edgeEl.classList.add('laser-source');
                        }

                        edgeEl.addEventListener('mouseenter', () => highlightPair(type, idx));
                        edgeEl.addEventListener('mouseleave', clearHighlight);

                        boardEl.appendChild(edgeEl);
                    } else {
                        let cellEl = document.createElement('div');
                        cellEl.classList.add('cell');
                        cellEl.dataset.row = r;
                        cellEl.dataset.col = c;
                        cellEl.style.width = `${cellSize}px`;
                        cellEl.style.height = `${cellSize}px`;

                        cellEl.addEventListener('click', () => handleCellClick(r, c));

                        cellEl.updateMirror = function() {
                            this.innerHTML = ""; 
                            if (playerGrid[r][c] === 1) {
                                let m = document.createElement('div'); m.classList.add('mirror', 'slash'); this.appendChild(m);
                            } else if (playerGrid[r][c] === 2) {
                                let m = document.createElement('div'); m.classList.add('mirror', 'backslash'); this.appendChild(m);
                            } else if (memoGrid[r][c] === 1) {
                                let m = document.createElement('div'); m.classList.add('memo-mirror', 'slash'); this.appendChild(m);
                            } else if (memoGrid[r][c] === 2) {
                                let m = document.createElement('div'); m.classList.add('memo-mirror', 'backslash'); this.appendChild(m);
                            }

                            // ゲームオーバー時に正解の鏡を表示
                            if (forceReveal && answerGrid[r][c] !== 0) {
                                let am = document.createElement('div');
                                am.classList.add('answer-mirror');
                                am.classList.add(answerGrid[r][c] === 1 ? 'slash' : 'backslash');
                                this.appendChild(am);
                            }
                        };

                        boardEl.appendChild(cellEl);
                        cellEl.updateMirror();
                    }
                }
            }
        }

        function handleCellClick(r, c) {
            if (isGameOver) return;
            
            statusText.textContent = "";
            const cellEl = document.querySelector(`.cell[data-row='${r}'][data-col='${c}']`);
            if (isMemoMode) {
                memoGrid[r][c] = (memoGrid[r][c] + 1) % 3;
            } else {
                playerGrid[r][c] = (playerGrid[r][c] + 1) % 3;
                if (playerGrid[r][c] !== 0) memoGrid[r][c] = 0;
            }
            if (cellEl) cellEl.updateMirror();
        }

        function highlightPair(type, idx) {
            clearHighlight();
            let targetPair = rayPairs.find(p => 
                (p.start.type === type && p.start.idx === idx) || 
                (p.end.type === type && p.end.idx === idx)
            );
            if (targetPair) {
                const startEl = document.querySelector(`.edge[data-type='${targetPair.start.type}'][data-idx='${targetPair.start.idx}']`);
                const endEl = document.querySelector(`.edge[data-type='${targetPair.end.type}'][data-idx='${targetPair.end.idx}']`);
                if (startEl) startEl.classList.add('highlight');
                if (endEl) endEl.classList.add('highlight-pair');
            }
        }

        function clearHighlight() {
            document.querySelectorAll('.edge').forEach(el => el.classList.remove('highlight', 'highlight-pair'));
        }

        function checkAnswer() {
            if (isGameOver || remainingChecks <= 0) return;

            remainingChecks--;
            btnCheck.textContent = `答え合わせ (残り${remainingChecks}回)`;

            let isCorrect = true;
            let errorMsg = "";

            for (let r = 0; r < N; r++) {
                let count = 0;
                for (let c = 0; c < N; c++) { if (playerGrid[r][c] !== 0) count++; }
                if (count !== 2) {
                    isCorrect = false;
                    errorMsg = `❌ 不正解: ${r+1}行目の鏡が2個ではありません`;
                    break;
                }
            }

            if (isCorrect) {
                for (let c = 0; c < N; c++) {
                    let count = 0;
                    for (let r = 0; r < N; r++) { if (playerGrid[r][c] !== 0) count++; }
                    if (count !== 2) {
                        isCorrect = false;
                        errorMsg = `❌ 不正解: ${c+1}列目の鏡が2個ではありません`;
                        break;
                    }
                }
            }

            if (isCorrect) {
                let playerPairs = simulateAllRays(playerGrid);
                for (let i = 0; i < rayPairs.length; i++) {
                    let target = rayPairs[i];
                    let player = playerPairs[i];
                    if (player.end.type !== target.end.type || player.end.idx !== target.end.idx) {
                        isCorrect = false;
                        errorMsg = "❌ 不正解: 光のつながりが問題のヒントと一致しない場所があります。";
                        break;
                    }
                }
            }

            if (isCorrect) {
                statusText.textContent = "🎉 正解です！すべての条件を完璧に満たしています！";
                statusText.style.color = "var(--accent-color)";
                isGameOver = true;
                btnCheck.disabled = true;
            } else {
                if (remainingChecks > 0) {
                    statusText.textContent = errorMsg;
                    statusText.style.color = "#ff4444";
                } else {
                    // 3回ミスでゲームオーバー処理
                    statusText.innerHTML = `${errorMsg}<br>💀 ゲームオーバー`;
                    statusText.style.color = "#ff4444";
                    isGameOver = true;
                    btnCheck.disabled = true;
                    forceReveal = true;
                    
                    // 【追加】プレイヤーの配置とメモをすべて消去
                    for (let r = 0; r < N; r++) {
                        for (let c = 0; c < N; c++) {
                            playerGrid[r][c] = 0;
                            memoGrid[r][c] = 0;
                        }
                    }
                    
                    refreshAllCells(); // 盤面を再描画（正解だけが表示される）
                }
            }
        }

        initGame();
    </script>
</body>
</html>
