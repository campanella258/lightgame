<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>光の反射パズル（リフレクションパズル）</title>
<style>
    body {
        font-family: sans-serif;
        text-align: center;
        background-color: #ffffff;
        color: #000000;
        margin-top: 30px;
    }
    h1 {
        font-size: 24px;
        margin-bottom: 10px;
    }
    #status-container {
        font-size: 18px;
        margin-bottom: 15px;
        font-weight: bold;
    }
    #shoot-count {
        color: #d9534f;
        font-size: 22px;
    }
    #ui-controls {
        margin-bottom: 20px;
    }
    button {
        padding: 8px 16px;
        font-size: 16px;
        cursor: pointer;
        margin: 0 5px;
        background-color: #f0f0f0;
        border: 1px solid #333;
        border-radius: 4px;
    }
    button:hover {
        background-color: #e0e0e0;
    }
    button:disabled {
        cursor: not-allowed;
        opacity: 0.5;
    }
    #sector-indicator {
        font-size: 18px;
        font-weight: bold;
        display: inline-block;
        width: 140px;
    }
    
    /* 盤面エリア (レスポンシブな正方形) */
    #game-area {
        position: relative;
        width: 100%;
        max-width: 400px;
        aspect-ratio: 1 / 1;
        margin: 0 auto;
        border: 2px solid #000;
        background-color: #fff;
        overflow: hidden; /* 領域外を隠す */
    }
    #grid-container {
        display: grid;
        width: 100%;
        height: 100%;
        position: relative;
        z-index: 1; /* レーザーより下に配置 */
    }
    .cell {
        border: 1px solid #000;
        box-sizing: border-box;
        position: relative;
        cursor: pointer;
        background-color: #fff;
    }
    .wall {
        background-color: #000;
        cursor: not-allowed;
    }
    .item-a::before {
        content: '';
        position: absolute;
        width: 60%;
        height: 60%;
        border: 4px solid #000;
        border-radius: 50%;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        box-sizing: border-box;
    }
    
    /* 鏡 (/) : mirror=1 */
    .mirror-1 {
        background-image: linear-gradient(to bottom right, transparent calc(50% - 2px), black calc(50% - 2px), black calc(50% + 2px), transparent calc(50% + 2px));
    }
    /* 鏡 (\) : mirror=2 */
    .mirror-2 {
        background-image: linear-gradient(to top right, transparent calc(50% - 2px), black calc(50% - 2px), black calc(50% + 2px), transparent calc(50% + 2px));
    }
    
    .start-top { box-shadow: inset 0 8px 0 blue; }
    .start-bottom { box-shadow: inset 0 -8px 0 blue; }
    .start-left { box-shadow: inset 8px 0 0 blue; }
    .start-right { box-shadow: inset -8px 0 0 blue; }

    .goal-top { box-shadow: inset 0 8px 0 red; }
    .goal-bottom { box-shadow: inset 0 -8px 0 red; }
    .goal-left { box-shadow: inset 8px 0 0 red; }
    .goal-right { box-shadow: inset -8px 0 0 red; }

    /* レーザー描画用キャンバス（内部論理は900x900） */
    #laser-canvas {
        position: absolute;
        top: 0;
        left: 0;
        pointer-events: none;
        z-index: 2;
    }
</style>
</head>
<body>

<h1>光の反射パズル</h1>

<div id="status-container">
    残り照射回数: <span id="shoot-count">5</span> 回
</div>

<div id="ui-controls">
    <button onclick="changeSector(-1)" id="btn-prev">前に戻る</button>
    <span id="sector-indicator">セクター: 1</span>
    <button onclick="changeSector(1)" id="btn-next">次に行く</button>
    <br><br>
    <button id="shoot-btn" onclick="shootLaser()">照射 / 再照射</button>
    <button onclick="initGame()">リセット</button>
</div>

<div id="game-area">
    <div id="grid-container"></div>
    <canvas id="laser-canvas" width="900" height="900"></canvas>
</div>

<script>
const GRID_SIZE = 9;
const CELL_SIZE = 100; // キャンバス内の論理的な1マスのサイズ
let grid = [];

// 方向: 0=上, 1=右, 2=下, 3=左
const DIR_UP = 0, DIR_RIGHT = 1, DIR_DOWN = 2, DIR_LEFT = 3;
const DX = [0, 1, 0, -1];
const DY = [-1, 0, 1, 0];

let currentSectorId = 0;
let startEdge = null;
let goalEdge = null;

let isShooting = false;
let isGameOver = false;
let remainingShoots = 5;

// アニメーション用変数
let animReq = null;
let laserPts = [];
let laserTotalLength = 0;
let totalDrawnLength = 0;
let lastTime = 0;

function getReflectedDir(dir, mirror) {
    if (mirror === 0) return dir;
    if (mirror === 1) return [1, 0, 3, 2][dir]; // '/'
    if (mirror === 2) return [3, 2, 1, 0][dir]; // '\'
    return dir;
}

function initGame() {
    remainingShoots = 5;
    isShooting = false;
    isGameOver = false;
    laserPts = [];
    if (animReq) cancelAnimationFrame(animReq);

    for (let y = 0; y < GRID_SIZE; y++) {
        grid[y] = [];
        for (let x = 0; x < GRID_SIZE; x++) {
            grid[y][x] = { type: 'empty', mirror: 0 };
        }
    }

    let edges = [];
    for (let x = 0; x < 9; x++) edges.push({ x: x, y: 0, side: 'top', dir: DIR_DOWN, sectorId: Math.floor(x / 3) });
    for (let x = 0; x < 9; x++) edges.push({ x: x, y: 8, side: 'bottom', dir: DIR_UP, sectorId: 6 + Math.floor(x / 3) });
    for (let y = 0; y < 9; y++) edges.push({ x: 0, y: y, side: 'left', dir: DIR_RIGHT, sectorId: Math.floor(y / 3) * 3 });
    for (let y = 0; y < 9; y++) edges.push({ x: 8, y: y, side: 'right', dir: DIR_LEFT, sectorId: Math.floor(y / 3) * 3 + 2 });

    startEdge = edges[Math.floor(Math.random() * edges.length)];
    while (true) {
        let candidate = edges[Math.floor(Math.random() * edges.length)];
        if (candidate.sectorId !== startEdge.sectorId) {
            goalEdge = candidate;
            break;
        }
    }

    // 【修正】壁の配置（各セクター2個）
    for (let sy = 0; sy < 3; sy++) {
        for (let sx = 0; sx < 3; sx++) {
            let wallsPlaced = 0;
            while (wallsPlaced < 2) {
                let dx = Math.floor(Math.random() * 3);
                let dy = Math.floor(Math.random() * 3);
                let x = sx * 3 + dx;
                let y = sy * 3 + dy;
                
                if ((x === startEdge.x && y === startEdge.y) || (x === goalEdge.x && y === goalEdge.y)) continue;
                if (grid[y][x].type === 'empty') {
                    grid[y][x].type = 'wall';
                    wallsPlaced++;
                }
            }
        }
    }

    // 【修正】アイテムAの配置（各セクターに確実に1つずつ、計9個）
    for (let sy = 0; sy < 3; sy++) {
        for (let sx = 0; sx < 3; sx++) {
            let itemsPlaced = 0;
            while (itemsPlaced < 1) {
                let dx = Math.floor(Math.random() * 3);
                let dy = Math.floor(Math.random() * 3);
                let x = sx * 3 + dx;
                let y = sy * 3 + dy;
                
                if ((x === startEdge.x && y === startEdge.y) || (x === goalEdge.x && y === goalEdge.y)) continue;
                if (grid[y][x].type === 'empty') {
                    grid[y][x].type = 'itemA';
                    itemsPlaced++;
                }
            }
        }
    }

    updateUI();
    drawSector();
}

function updateUI() {
    document.getElementById('shoot-count').innerText = remainingShoots;
    
    const indicator = document.getElementById('sector-indicator');
    const btnPrev = document.getElementById('btn-prev');
    const btnNext = document.getElementById('btn-next');
    const btnShoot = document.getElementById('shoot-btn');

    if (isGameOver) {
        indicator.innerText = `全体表示 (9×9)`;
        btnPrev.disabled = true;
        btnNext.disabled = true;
        btnShoot.disabled = true;
    } else {
        indicator.innerText = `セクター: ${currentSectorId + 1}`;
        btnPrev.disabled = false;
        btnNext.disabled = false;
        btnShoot.disabled = false;
    }
}

function changeSector(dir) {
    if (isGameOver) return;
    currentSectorId += dir;
    if (currentSectorId < 0) currentSectorId = 8;
    if (currentSectorId > 8) currentSectorId = 0;
    updateUI();
    drawSector();
}

function createCell(x, y, container) {
    let cell = grid[y][x];
    let div = document.createElement('div');
    div.className = 'cell';

    if (cell.type === 'wall') div.classList.add('wall');
    if (cell.type === 'itemA') div.classList.add('item-a');
    if (cell.mirror === 1) div.classList.add('mirror-1');
    if (cell.mirror === 2) div.classList.add('mirror-2');

    if (startEdge.x === x && startEdge.y === y) div.classList.add('start-' + startEdge.side);
    if (goalEdge.x === x && goalEdge.y === y) div.classList.add('goal-' + goalEdge.side);

    div.onclick = () => {
        if (isShooting || isGameOver) return; 
        if (cell.type === 'wall' || cell.type === 'itemA') return; 

        if (!isShooting && laserPts.length > 0) {
            laserPts = [];
            drawCanvas();
        }

        cell.mirror = (cell.mirror + 1) % 3;
        drawSector();
    };
    container.appendChild(div);
}

// 【修正】全体表示とセクター表示を切り替えられるように描画処理をアップデート
function drawSector() {
    const container = document.getElementById('grid-container');
    const canvas = document.getElementById('laser-canvas');
    container.innerHTML = '';
    canvas.style.transformOrigin = 'top left';

    if (isGameOver) {
        // 全体表示 (9x9)
        container.style.gridTemplateColumns = 'repeat(9, 1fr)';
        container.style.gridTemplateRows = 'repeat(9, 1fr)';
        canvas.style.width = '100%';
        canvas.style.height = '100%';
        canvas.style.transform = 'translate(0, 0)';

        for (let y = 0; y < 9; y++) {
            for (let x = 0; x < 9; x++) {
                createCell(x, y, container);
            }
        }
    } else {
        // セクター表示 (3x3)
        container.style.gridTemplateColumns = 'repeat(3, 1fr)';
        container.style.gridTemplateRows = 'repeat(3, 1fr)';
        // キャンバスのサイズを3倍にし、該当セクターの位置へシフトさせる
        canvas.style.width = '300%';
        canvas.style.height = '300%';
        let sy = Math.floor(currentSectorId / 3);
        let sx = currentSectorId % 3;
        canvas.style.transform = `translate(-${sx * 33.3333}%, -${sy * 33.3333}%)`;

        for (let y = sy * 3; y < sy * 3 + 3; y++) {
            for (let x = sx * 3; x < sx * 3 + 3; x++) {
                createCell(x, y, container);
            }
        }
    }
    drawCanvas();
}

function shootLaser() {
    if (isGameOver) return;
    
    if (isShooting && animReq) {
        cancelAnimationFrame(animReq);
        isShooting = false;
    }

    if (remainingShoots <= 0) return;

    remainingShoots--;
    updateUI();
    laserPts = [];
    
    let curX = startEdge.x;
    let curY = startEdge.y;
    let curDir = startEdge.dir; 

    let startPx = curX * CELL_SIZE + CELL_SIZE / 2;
    let startPy = curY * CELL_SIZE + CELL_SIZE / 2;
    if (startEdge.side === 'top') startPy -= CELL_SIZE / 2;
    if (startEdge.side === 'bottom') startPy += CELL_SIZE / 2;
    if (startEdge.side === 'left') startPx -= CELL_SIZE / 2;
    if (startEdge.side === 'right') startPx += CELL_SIZE / 2;

    laserPts.push({ x: startPx, y: startPy, event: null });

    while (true) {
        if (curX < 0 || curX >= 9 || curY < 0 || curY >= 9) break; 

        let cell = grid[curY][curX];

        if (cell.type === 'wall') {
            laserPts[laserPts.length - 1].event = 'wall';
            break;
        }

        let cx = curX * CELL_SIZE + CELL_SIZE / 2;
        let cy = curY * CELL_SIZE + CELL_SIZE / 2;
        laserPts.push({ x: cx, y: cy, event: null });

        if (cell.type === 'itemA') {
            laserPts[laserPts.length - 1].event = 'itemA';
            break;
        }

        let nextDir = getReflectedDir(curDir, cell.mirror);
        let exitX = cx;
        let exitY = cy;
        if (nextDir === DIR_UP) exitY -= CELL_SIZE / 2;
        if (nextDir === DIR_DOWN) exitY += CELL_SIZE / 2;
        if (nextDir === DIR_LEFT) exitX -= CELL_SIZE / 2;
        if (nextDir === DIR_RIGHT) exitX += CELL_SIZE / 2;

        laserPts.push({ x: exitX, y: exitY, event: null });

        let isGoal = false;
        if (goalEdge.x === curX && goalEdge.y === curY) {
            if (goalEdge.side === 'top' && nextDir === DIR_UP) isGoal = true;
            if (goalEdge.side === 'bottom' && nextDir === DIR_DOWN) isGoal = true;
            if (goalEdge.side === 'left' && nextDir === DIR_LEFT) isGoal = true;
            if (goalEdge.side === 'right' && nextDir === DIR_RIGHT) isGoal = true;
        }

        if (isGoal) {
            laserPts[laserPts.length - 1].event = 'goal';
            break;
        }

        curX += DX[nextDir];
        curY += DY[nextDir];
        curDir = nextDir;
    }

    laserTotalLength = 0;
    for (let i = 1; i < laserPts.length; i++) {
        let dx = laserPts[i].x - laserPts[i-1].x;
        let dy = laserPts[i].y - laserPts[i-1].y;
        laserPts[i].dist = Math.sqrt(dx * dx + dy * dy);
        laserTotalLength += laserPts[i].dist;
    }

    totalDrawnLength = 0;
    isShooting = true;
    lastTime = performance.now();
    animReq = requestAnimationFrame(animateLaser);
}

function animateLaser(time) {
    let dt = time - lastTime;
    lastTime = time;
    
    let speed = 0.8; 
    totalDrawnLength += speed * dt;

    if (totalDrawnLength >= laserTotalLength) {
        totalDrawnLength = laserTotalLength;
        isShooting = false;
        drawCanvas();
        handleLaserEnd(laserPts[laserPts.length - 1].event);
    } else {
        drawCanvas();
        animReq = requestAnimationFrame(animateLaser);
    }
}

function handleLaserEnd(event) {
    if (event === 'itemA') {
        setTimeout(() => {
            alert('アイテムAに触れました！盤面のすべての鏡が消滅します。');
            for (let y = 0; y < 9; y++) {
                for (let x = 0; x < 9; x++) grid[y][x].mirror = 0;
            }
            laserPts = [];
            drawCanvas();
            drawSector();
        }, 10);
    } else if (event === 'goal') {
        isGameOver = true;
        updateUI();
        drawSector(); // 盤面全体を再描画
        setTimeout(() => alert('クリア！光がゴールに到達しました。'), 50);
    } else {
        if (remainingShoots === 0) {
            isGameOver = true;
            updateUI();
            drawSector(); // 盤面全体を再描画
            setTimeout(() => alert('ゲームオーバー！照射回数が上限に達しました。'), 50);
        }
    }
}

function drawCanvas() {
    const canvas = document.getElementById('laser-canvas');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (laserPts.length < 2) return;

    ctx.strokeStyle = 'red';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(laserPts[0].x, laserPts[0].y);

    let l = totalDrawnLength;
    for (let i = 1; i < laserPts.length; i++) {
        if (l >= laserPts[i].dist) {
            ctx.lineTo(laserPts[i].x, laserPts[i].y);
            l -= laserPts[i].dist;
        } else {
            let ratio = l / laserPts[i].dist;
            let ix = laserPts[i-1].x + (laserPts[i].x - laserPts[i-1].x) * ratio;
            let iy = laserPts[i-1].y + (laserPts[i].y - laserPts[i-1].y) * ratio;
            ctx.lineTo(ix, iy);
            break;
        }
    }
    ctx.stroke();
}

initGame();
</script>
</body>
</html>
